services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: webhooks
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d webhooks"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://app_user:app_password@postgres:5432/webhooks
      MIGRATION_DATABASE_URL: postgres://postgres:postgres@postgres:5432/webhooks
      APP_DB_USER: app_user
      APP_DB_PASSWORD: app_password
      CLIENT_A_SECRET: client-a-secret
      CLIENT_B_SECRET: client-b-secret
      CLIENT_A_TOKEN: client-a-token
      CLIENT_B_TOKEN: client-b-token
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 10
